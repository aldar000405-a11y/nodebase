model_list:
  - model_name: "anthropic/*"  # Maps Anthropic-style model requests
    litellm_params:
      model: "openai/qwen3-coder-30b"  # Logical name for your local model
      api_base: "http://host.docker.internal:1234/v1"  # LM Studio base (host.docker.internal works from Docker)
      api_key: "lm-studio"
      max_tokens: 65536
      repetition_penalty: 1.05
      temperature: 0.7
      top_k: 20
      top_p: 0.8
